name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test ./... -count=1

      - name: Validate semver tag
        run: |
          if ! echo "${{ github.ref_name }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: tag '${{ github.ref_name }}' is not valid semver"
            exit 1
          fi

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72  # v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72  # v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries
        run: |
          VERSION=${{ github.ref_name }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o bin/chop-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o bin/chop-linux-arm64 .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o bin/chop-darwin-amd64 .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o bin/chop-darwin-arm64 .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o bin/chop-windows-amd64.exe .

      - name: Generate checksums
        run: cd bin && sha256sum chop-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: |
            bin/chop-linux-amd64
            bin/chop-linux-arm64
            bin/chop-darwin-amd64
            bin/chop-darwin-arm64
            bin/chop-windows-amd64.exe
            bin/checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: bin/chop-*

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          [ -z "${HOMEBREW_TAP_TOKEN}" ] && echo "HOMEBREW_TAP_TOKEN not set, skipping" && exit 0
          VERSION=${{ github.ref_name }}
          VER=${VERSION#v}
          SHA_DARWIN_ARM64=$(sha256sum bin/chop-darwin-arm64 | awk '{print $1}')
          SHA_DARWIN_AMD64=$(sha256sum bin/chop-darwin-amd64 | awk '{print $1}')
          SHA_LINUX_AMD64=$(sha256sum bin/chop-linux-amd64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum bin/chop-linux-arm64 | awk '{print $1}')
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/AgusRdz/homebrew-tap.git tap
          cat > tap/Formula/chop.rb << FORMULA
          class Chop < Formula
            desc "CLI output compressor for Claude Code"
            homepage "https://getchop.run"
            version "${VER}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/AgusRdz/chop/releases/download/${VERSION}/chop-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/AgusRdz/chop/releases/download/${VERSION}/chop-darwin-amd64"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/AgusRdz/chop/releases/download/${VERSION}/chop-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/AgusRdz/chop/releases/download/${VERSION}/chop-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              binary = Dir["chop-*"].first
              chmod 0755, binary
              bin.install binary => "chop"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/chop --version")
            end
          end
          FORMULA
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/chop.rb
          git commit -m "chop ${VERSION}"
          git push
