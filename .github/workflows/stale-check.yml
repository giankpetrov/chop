name: Stale branch check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-up-to-date:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Check if branch is behind main
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comparison } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'main',
              head: context.payload.pull_request.head.sha,
            });

            const behindBy = comparison.behind_by;

            if (behindBy === 0) {
              console.log('Branch is up to date with main.');
              return;
            }

            const body = [
              `> [!WARNING]`,
              `> This branch is **${behindBy} commit(s) behind \`main\`** and will need to be updated before it can be applied cleanly.`,
              `>`,
              `> Please sync your fork and rebase before continuing:`,
              `>`,
              `> \`\`\`bash`,
              `> # If you have upstream configured`,
              `> git fetch upstream`,
              `> git rebase upstream/main`,
              `> git push origin ${context.payload.pull_request.head.ref} --force-with-lease`,
              `>`,
              `> # Or if your fork's main is already synced via GitHub UI`,
              `> git fetch origin main`,
              `> git rebase origin/main`,
              `> git push origin ${context.payload.pull_request.head.ref} --force-with-lease`,
              `> \`\`\``,
              `>`,
              `> See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md#keeping-your-fork-up-to-date) for the full guide.`,
            ].join('\n');

            // Check if we already posted this warning to avoid spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const alreadyPosted = comments.some(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('behind `main`')
            );

            if (!alreadyPosted) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body,
                });
              } catch (err) {
                console.log(`Could not post comment (insufficient permissions): ${err.message}`);
              }
            }
